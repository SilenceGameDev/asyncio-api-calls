<html>
<head>
    <title>Trevaughn Primus Async API Calls Loading Page</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
    <link rel="stylesheet" href="static/assets/css/main.css"/>
</head>
<body class="is-preload">

<!-- Wrapper -->
<div id="wrapper">

    <!-- Main -->
    <div id="main">
        <div class="inner">

            <!-- Header -->
            {%include 'header.html'%}

            <!-- Content -->
            <section>
                <header class="main">
                    <h1>Loading</h1>
                </header>

                <span><img src="static/images/loading_gif.gif" alt="loading image" width="50%" height="50%"/></span>

                <p>Your results are being gathered. Thank you for your patience.</p>
            </section>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="inner">
            <!-- Menu -->
            <nav id="menu">
                <header class="major">
                    <h2>Menu</h2>
                </header>
                <ul>
                    <li><a href="index.html">Homepage</a></li>
                </ul>
            </nav>

            <!-- Footer -->
            {% include 'footer.html' %}
        </div>
    </div>
</div>

<!-- Hidden form carrying the amounts forward -->
<form id="fetch-form" action="/api_results" method="POST" style="display:none;">
    <input type="hidden" name="meals" value="{{ amounts['meals'] }}">
    <input type="hidden" name="pokemon" value="{{ amounts['pokemon'] }}">
    <input type="hidden" name="bible" value="{{ amounts['bible'] }}">
    <input type="hidden" name="currencies" value="{{ amounts['currencies'] }}">
    <input type="hidden" name="zelda" value="{{ amounts['zelda'] }}">
</form>
<!-- Scripts -->
<script src="static/assets/js/jquery.min.js"></script>
<script src="static/assets/js/browser.min.js"></script>
<script src="static/assets/js/breakpoints.min.js"></script>
<script src="static/assets/js/util.js"></script>
<script src="static/assets/js/main.js"></script>
<!-- Wait 2 seconds then submit the form to kick off fetching -->
<script>
    setTimeout(function()
    {
    document.getElementById('fetch-form').submit();
    }, 2000);
</script>
</body>
</html>
